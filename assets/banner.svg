<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Project Initializer Banner</title>
  <desc id="desc">Editorial style banner for a Windows project initializer repository.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#061117"/>
      <stop offset="0.55" stop-color="#0C2530"/>
      <stop offset="1" stop-color="#123947"/>
    </linearGradient>
    <linearGradient id="beam" x1="170" y1="58" x2="1120" y2="368" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F4A261"/>
      <stop offset="1" stop-color="#E76F51"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1F29"/>
      <stop offset="1" stop-color="#12303D"/>
    </linearGradient>
    <pattern id="microgrid" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M18 0H0V18" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <rect width="1280" height="420" fill="url(#bg)"/>
  <rect width="1280" height="420" fill="url(#microgrid)"/>

  <ellipse cx="1040" cy="72" rx="250" ry="110" fill="#264653" fill-opacity="0.42" filter="url(#blur)"/>
  <ellipse cx="152" cy="360" rx="220" ry="90" fill="#2A9D8F" fill-opacity="0.24" filter="url(#blur)"/>

  <path d="M0 296L220 238L472 312L768 194L1028 280L1280 156V420H0V296Z" fill="#041118" fill-opacity="0.56"/>
  <path d="M0 340L226 276L460 328L784 226L1028 300L1280 214V420H0V340Z" fill="#000C11" fill-opacity="0.56"/>

  <rect x="58" y="54" width="694" height="312" rx="22" fill="url(#panel)" fill-opacity="0.92" stroke="#7FC8B6" stroke-opacity="0.36"/>
  <rect x="70" y="68" width="670" height="48" rx="12" fill="#07161E" stroke="#4C7A88" stroke-opacity="0.5"/>

  <g transform="translate(90,81)">
    <circle cx="10" cy="10" r="4" fill="#E76F51"/>
    <circle cx="28" cy="10" r="4" fill="#E9C46A"/>
    <circle cx="46" cy="10" r="4" fill="#2A9D8F"/>
    <text x="72" y="15" fill="#7FC8B6" font-family="Consolas, 'Courier New', monospace" font-size="14">initializer terminal</text>
  </g>

  <g transform="translate(94,148)">
    <rect x="0" y="0" width="18" height="18" rx="4" fill="url(#beam)"/>
    <text x="28" y="14" fill="#A8DADC" font-family="Consolas, 'Courier New', monospace" font-size="15" letter-spacing="0.14em">WINDOWS AUTOMATION KIT</text>
  </g>

  <text x="94" y="224" fill="#F1FAEE" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="700">PROJECT</text>
  <text x="94" y="288" fill="#F1FAEE" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="700">INITIALIZER</text>
  <text x="94" y="332" fill="#9FD7C9" font-family="Consolas, 'Courier New', monospace" font-size="22">From zero to configured workspace in one guided flow.</text>

  <g transform="translate(824,68)">
    <rect x="0" y="0" width="398" height="286" rx="20" fill="#0A1E27" fill-opacity="0.9" stroke="#7FC8B6" stroke-opacity="0.33"/>
    <rect x="18" y="18" width="362" height="42" rx="11" fill="#07161E" stroke="#3B5E69"/>
    <text x="34" y="45" fill="#9FD7C9" font-family="Consolas, 'Courier New', monospace" font-size="17">quick install profile</text>

    <g font-family="Consolas, 'Courier New', monospace" font-size="16" fill="#E2F5EE">
      <text x="30" y="92">[X] find-skills</text>
      <text x="30" y="122">[X] frontend-design</text>
      <text x="30" y="152">[X] browser-use</text>
      <text x="30" y="182">[X] skills update</text>
      <text x="30" y="212">[X] prompt download (v0.txt)</text>
    </g>

    <rect x="20" y="236" width="358" height="34" rx="8" fill="#031017" stroke="#3F6A76"/>
    <text x="34" y="258" fill="#8DD9C2" font-family="Consolas, 'Courier New', monospace" font-size="15">initializer.bat -Profile camil-default</text>
  </g>

  <path d="M792 0L1280 0L1280 420L980 420L792 0Z" fill="url(#beam)" fill-opacity="0.09"/>
</svg>
