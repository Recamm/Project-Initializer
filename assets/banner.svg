<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Project Initializer Banner</title>
  <desc id="desc">Bold geometric banner for the Project Initializer repository.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1A2B"/>
      <stop offset="0.45" stop-color="#12385D"/>
      <stop offset="1" stop-color="#1A5E8E"/>
    </linearGradient>
    <linearGradient id="accent" x1="213" y1="36" x2="1080" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFB703"/>
      <stop offset="1" stop-color="#FB8500"/>
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" stroke="#FFFFFF" stroke-opacity="0.07"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1280" height="420" fill="url(#bg)"/>
  <rect width="1280" height="420" fill="url(#grid)"/>

  <circle cx="1120" cy="80" r="130" fill="#8ECAE6" fill-opacity="0.25" filter="url(#soft)"/>
  <circle cx="180" cy="350" r="160" fill="#FFB703" fill-opacity="0.18" filter="url(#soft)"/>

  <path d="M0 330L270 230L460 320L760 170L980 260L1280 120V420H0V330Z" fill="#001F33" fill-opacity="0.55"/>

  <g transform="translate(78,66)">
    <rect x="0" y="0" width="540" height="290" rx="20" fill="#072238" fill-opacity="0.74" stroke="#8ECAE6" stroke-opacity="0.35"/>

    <rect x="34" y="36" width="34" height="34" rx="7" fill="url(#accent)"/>
    <path d="M46 53H56" stroke="#00141F" stroke-width="3" stroke-linecap="round"/>
    <path d="M51 48V58" stroke="#00141F" stroke-width="3" stroke-linecap="round"/>

    <text x="88" y="60" fill="#D7EEFF" font-family="Segoe UI, Tahoma, sans-serif" font-size="18" letter-spacing="0.12em">WINDOWS PROJECT TOOLKIT</text>

    <text x="34" y="124" fill="#FFFFFF" font-family="Segoe UI, Tahoma, sans-serif" font-size="54" font-weight="700">PROJECT</text>
    <text x="34" y="180" fill="#FFFFFF" font-family="Segoe UI, Tahoma, sans-serif" font-size="54" font-weight="700">INITIALIZER</text>

    <text x="34" y="228" fill="#9DD7FF" font-family="Consolas, 'Courier New', monospace" font-size="22">One command. Full setup. Ready to code.</text>

    <g transform="translate(34,246)">
      <rect x="0" y="0" width="152" height="34" rx="17" fill="#FB8500"/>
      <text x="24" y="23" fill="#072238" font-family="Segoe UI, Tahoma, sans-serif" font-size="16" font-weight="700">BAT + POWERSHELL</text>

      <rect x="166" y="0" width="112" height="34" rx="17" fill="#8ECAE6"/>
      <text x="198" y="23" fill="#072238" font-family="Segoe UI, Tahoma, sans-serif" font-size="16" font-weight="700">NPX SKILLS</text>

      <rect x="292" y="0" width="110" height="34" rx="17" fill="#FFB703"/>
      <text x="326" y="23" fill="#072238" font-family="Segoe UI, Tahoma, sans-serif" font-size="16" font-weight="700">PROMPTS</text>
    </g>
  </g>

  <g transform="translate(730,68)">
    <rect x="0" y="0" width="470" height="286" rx="18" fill="#082A44" fill-opacity="0.86" stroke="#8ECAE6" stroke-opacity="0.35"/>
    <text x="24" y="36" fill="#9DD7FF" font-family="Consolas, 'Courier New', monospace" font-size="20">setup checklist</text>

    <g font-family="Consolas, 'Courier New', monospace" font-size="18" fill="#EAF6FF">
      <text x="26" y="78">[X] Install find-skills</text>
      <text x="26" y="110">[X] Install frontend-design</text>
      <text x="26" y="142">[X] Install browser-use</text>
      <text x="26" y="174">[X] Update installed skills</text>
      <text x="26" y="206">[X] Download Prompt.txt to v0.txt</text>
    </g>

    <rect x="24" y="232" width="422" height="34" rx="8" fill="#001A2A" stroke="#2A6F97"/>
    <text x="36" y="254" fill="#8ECAE6" font-family="Consolas, 'Courier New', monospace" font-size="16">initializer.bat -Profile camil-default</text>
  </g>
</svg>
